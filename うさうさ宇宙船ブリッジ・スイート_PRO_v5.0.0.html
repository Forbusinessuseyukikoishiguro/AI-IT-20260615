<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うさうさ宇宙船ブリッジ・スイート PRO｜AI研修ナビゲーター</title>
<style>
  :root{
    --space:#05060d;--space2:#0a0e1a;--panel:#121829;--panel2:#0e1322;
    --amber:#f0a93b;--amber-soft:#f8cf83;--teal:#54d2c4;--rose:#e87a96;--lav:#bda6e8;--gold:#f5d77a;
    --ivory:#f4eede;--muted:#9aa0b8;--faint:#646a86;
    --line:rgba(189,166,232,0.18);--line-amber:rgba(240,169,59,0.34);--ok:#6fe0a8;--err:#ff7b8c;
    --mono:ui-monospace,"SFMono-Regular",Menlo,"Roboto Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    --rail:14px;--glow:0 0 22px rgba(240,169,59,.28);
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ivory);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    background:radial-gradient(1100px 760px at 86% -8%,rgba(84,210,196,.13),transparent 60%),radial-gradient(1200px 800px at 4% 0%,rgba(240,169,59,.13),transparent 58%),radial-gradient(800px 600px at 50% 116%,rgba(232,122,150,.10),transparent 60%),linear-gradient(180deg,var(--space),var(--space2));min-height:100vh}
  body::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 90% at 50% 40%,transparent 55%,rgba(0,0,0,.45) 100%)}
  a{color:var(--teal)} ::selection{background:rgba(240,169,59,.35)} .mono{font-family:var(--mono)}

  .starfield{position:fixed;inset:-10%;z-index:0;pointer-events:none}
  .stars{position:absolute;inset:0;background-repeat:repeat}
  .s1{background-image:radial-gradient(1px 1px at 24px 36px,rgba(255,255,255,.9),transparent),radial-gradient(1px 1px at 120px 90px,rgba(255,255,255,.55),transparent),radial-gradient(1.4px 1.4px at 180px 40px,rgba(246,199,121,.7),transparent),radial-gradient(1px 1px at 60px 150px,rgba(255,255,255,.5),transparent);background-size:230px 230px;animation:drift1 120s linear infinite}
  .s2{background-image:radial-gradient(1px 1px at 80px 60px,rgba(189,166,232,.7),transparent),radial-gradient(1.6px 1.6px at 200px 160px,rgba(84,210,196,.6),transparent),radial-gradient(1px 1px at 150px 210px,rgba(255,255,255,.5),transparent);background-size:320px 320px;animation:drift2 90s linear infinite,tw 6s ease-in-out infinite}
  .s3{background-image:radial-gradient(2px 2px at 40px 120px,rgba(245,215,122,.8),transparent),radial-gradient(2.2px 2.2px at 260px 60px,rgba(232,122,150,.6),transparent);background-size:420px 420px;animation:drift3 60s linear infinite}
  @keyframes drift1{to{transform:translateY(230px)}} @keyframes drift2{to{transform:translate(-160px,320px)}} @keyframes drift3{to{transform:translate(140px,420px)}} @keyframes tw{0%,100%{opacity:.75}50%{opacity:1}}

  #boot{position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:radial-gradient(circle at 50% 45%,#0b1020,#05060d 70%);transition:opacity .7s,visibility .7s}
  #boot.gone{opacity:0;visibility:hidden}
  .boot-core{text-align:center;max-width:440px;padding:0 20px}
  .boot-ring{width:96px;height:96px;margin:0 auto 22px;border-radius:50%;display:grid;place-items:center;font-size:46px;background:radial-gradient(circle at 32% 26%,rgba(240,169,59,.5),rgba(232,122,150,.2));border:2px solid var(--amber);box-shadow:0 0 40px rgba(240,169,59,.5),inset 0 0 26px rgba(232,122,150,.25);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(240,169,59,.5),inset 0 0 26px rgba(232,122,150,.25)}50%{box-shadow:0 0 64px rgba(240,169,59,.8),inset 0 0 30px rgba(84,210,196,.3)}}
  .boot-core h2{font-size:18px;letter-spacing:.06em;margin:0 0 6px} .boot-log{font-family:var(--mono);font-size:11.5px;color:var(--teal);letter-spacing:.08em;min-height:18px;margin-bottom:16px}
  .boot-bar{height:6px;border-radius:4px;background:rgba(189,166,232,.16);overflow:hidden} .boot-bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rose),var(--amber),var(--teal));box-shadow:0 0 14px rgba(240,169,59,.6);transition:width .1s linear}
  .boot-skip{margin-top:18px;font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.1em;cursor:pointer;background:none;border:0} .boot-skip:hover{color:var(--muted)}

  header.topbar{position:relative;z-index:6;display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:13px 22px;border-bottom:2px solid var(--line-amber);background:linear-gradient(180deg,rgba(7,9,16,.95),rgba(7,9,16,.6));backdrop-filter:blur(9px)}
  .brand{display:flex;align-items:center;gap:14px;min-width:0}
  .badge{width:48px;height:48px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:25px;background:radial-gradient(circle at 32% 26%,rgba(240,169,59,.55),rgba(232,122,150,.25));border:2px solid var(--amber);box-shadow:0 0 22px rgba(240,169,59,.4),inset 0 0 16px rgba(232,122,150,.2);animation:bob 4.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-3px) rotate(-3deg)}}
  .brand h1{font-size:16px;margin:0;letter-spacing:.04em;background:linear-gradient(90deg,var(--amber-soft),var(--gold),var(--rose));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .sub{font-family:var(--mono);font-size:10.5px;color:var(--teal);letter-spacing:.14em}
  .verchip{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--space);background:var(--gold);padding:2px 8px;border-radius:8px;margin-left:8px;font-weight:700}
  .topbar .spacer{flex:1} .toolbtns{display:flex;gap:8px;flex-wrap:wrap}
  button.hud{font-family:var(--sans);font-weight:700;font-size:12px;letter-spacing:.05em;color:var(--space);cursor:pointer;border:0;background:var(--amber);padding:10px 14px;border-radius:18px 6px 18px 6px;transition:.16s;white-space:nowrap;position:relative;overflow:hidden}
  button.hud::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-18deg);transition:.5s}
  button.hud:hover::after{left:130%} button.hud:hover{box-shadow:var(--glow);transform:translateY(-1px)}
  button.hud.teal{background:var(--teal)} button.hud.rose{background:var(--rose)} button.hud.lav{background:var(--lav)}
  button.hud.ghost{background:transparent;color:var(--ivory);border:1px solid var(--line);border-radius:18px 6px 18px 6px} button.hud.ghost:hover{background:rgba(189,166,232,.12)}
  button.hud .dotbadge{background:var(--err);color:#3a0c14;font-size:9px;font-weight:800;border-radius:8px;padding:0 5px;margin-left:5px}
  button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .sysline{width:100%;font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.08em;display:flex;align-items:center;gap:8px}
  .sysline b{color:var(--ok)} .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:blink 2.6s infinite} @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}} #ticker{color:var(--teal)}

  .shell{position:relative;z-index:3;display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 86px)}
  nav.deck{padding:18px 14px 18px 0;position:relative}
  .deck-elbow{height:38px;border-radius:0 0 0 28px;background:var(--amber);display:flex;align-items:flex-start;box-shadow:var(--glow)} .deck-elbow .cap{margin-left:auto;margin-right:14px;margin-top:9px;color:var(--space);font-weight:800;letter-spacing:.16em;font-size:11px}
  .deck-rail{border-left:var(--rail) solid var(--amber);padding:14px 12px 14px 14px;margin-top:-2px}
  .deck-title{font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:10.5px;color:var(--faint);margin:0 0 12px 2px}
  .modules{display:flex;flex-direction:column;gap:7px}
  .mod{display:flex;gap:11px;align-items:center;padding:9px 12px;border-radius:6px 16px 16px 6px;cursor:pointer;border:0;width:100%;text-align:left;color:var(--space);font-family:inherit;transition:.16s;background:var(--lav);position:relative;overflow:hidden}
  .mod:nth-child(2){background:var(--teal)} .mod:nth-child(3){background:var(--amber-soft)} .mod:nth-child(4){background:var(--rose)} .mod:nth-child(5){background:var(--lav)} .mod:nth-child(6){background:var(--teal)}
  .mod:hover{filter:brightness(1.09);transform:translateX(3px)} .mod.active{outline:2px solid var(--ivory);outline-offset:1px;box-shadow:0 0 20px rgba(244,238,222,.3)}
  .mod .lamp{flex:none;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:800;font-family:var(--mono);background:rgba(5,6,13,.8);color:var(--ivory)} .mod.done .lamp{background:var(--ok);color:var(--space);box-shadow:0 0 10px rgba(111,224,168,.7)}
  .mod .mtxt{min-width:0} .mod .mcode{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;opacity:.8} .mod .mname{font-size:13px;font-weight:800;line-height:1.25} .mod .mprog{font-family:var(--mono);font-size:9.5px;opacity:.75;margin-top:1px}
  .deck-foot{margin-top:18px;background:var(--panel);border-radius:6px 16px 16px 6px;padding:12px 14px;border:1px solid var(--line)} .deck-foot .lcars-label{color:var(--amber);font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:10.5px;margin-bottom:7px;display:block}
  .meter{height:9px;border-radius:5px;background:rgba(189,166,232,.16);overflow:hidden;position:relative} .meter>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rose),var(--amber),var(--teal));transition:width .5s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(240,169,59,.6);position:relative}
  .meter>span::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);background-size:60px 100%;animation:sh 1.8s linear infinite} @keyframes sh{from{background-position:-60px 0}to{background-position:200px 0}}
  .deck-foot .pct{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px;text-align:right}
  .deck-mini{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
  .deck-mini button{flex:1;min-width:84px;font-size:10.5px;font-weight:700;color:var(--ivory);background:rgba(84,210,196,.08);border:1px solid var(--line);border-radius:8px;padding:7px 6px;cursor:pointer;transition:.15s} .deck-mini button:hover{background:rgba(84,210,196,.18)}

  main.stage{padding:22px 26px 70px;min-width:0}
  .panel{position:relative;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:18px;box-shadow:0 14px 40px rgba(0,0,0,.35)}
  .panel.stagein{animation:stagein .4s ease both} @keyframes stagein{from{opacity:0;transform:translateY(12px) scale(.995)}to{opacity:1;transform:none}}
  .phead{display:flex;align-items:stretch;gap:0;position:relative}
  .phead .blk{width:62px;flex:none;border-radius:0 0 22px 0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;position:relative} .phead .blk::after{content:"";position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 0 18px rgba(255,255,255,.25)} .phead .blk b{color:var(--space);font-family:var(--mono);font-size:10px;letter-spacing:.06em}
  .phead .ht{padding:13px 18px 8px 8px;flex:1;min-width:0} .phead .ht .ec{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--teal)} .phead .ht h2{margin:2px 0 0;font-size:19px;letter-spacing:.01em}
  .phead .lamps{display:flex;gap:5px;padding:16px 16px 0 0} .phead .lamps i{width:9px;height:9px;border-radius:50%;display:block;animation:lp 3s ease-in-out infinite} .phead .lamps i:nth-child(2){animation-delay:.6s} .phead .lamps i:nth-child(3){animation-delay:1.2s} @keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
  .blk-amber{background:var(--amber)} .blk-teal{background:var(--teal)} .blk-rose{background:var(--rose)} .blk-lav{background:var(--lav)}
  .l-amber{background:var(--amber)} .l-teal{background:var(--teal)} .l-rose{background:var(--rose)} .l-lav{background:var(--lav)}
  .pbody{padding:8px 20px 20px}
  .phase-mission{color:var(--muted);font-size:13px;max-width:800px;margin-top:8px} .phase-mission b{color:var(--amber-soft);font-weight:700}

  .field{margin-top:18px} .field>label.flabel{display:block;font-size:13px;font-weight:700;margin-bottom:5px} .field>label.flabel .tag{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.1em;margin-left:8px} .field .hint{font-size:11.5px;color:var(--faint);margin:-1px 0 8px}
  input[type=text],textarea{width:100%;font-family:var(--sans);font-size:13.5px;color:var(--ivory);background:rgba(5,6,13,.62);border:1px solid var(--line);border-radius:7px;padding:10px 12px;resize:vertical;transition:.15s} input[type=text]:focus,textarea:focus{border-color:var(--amber);background:rgba(5,6,13,.88);box-shadow:0 0 0 3px rgba(240,169,59,.1)} textarea{min-height:60px;line-height:1.55} ::placeholder{color:var(--faint)}
  .listrows{display:flex;flex-direction:column;gap:8px} .listrow{display:flex;gap:8px;align-items:flex-start} .listrow .idx{font-family:var(--mono);font-size:11px;color:var(--faint);padding-top:11px;flex:none;width:22px;text-align:right} .listrow input{flex:1}
  .xbtn{flex:none;width:34px;height:38px;border-radius:7px;border:1px solid var(--line);background:rgba(232,122,150,.08);color:var(--rose);cursor:pointer;font-size:15px;transition:.15s} .xbtn:hover{background:rgba(232,122,150,.22)}
  .addbtn{margin-top:9px;font-weight:700;font-size:11.5px;letter-spacing:.04em;color:var(--space);background:var(--teal);border:0;border-radius:14px 5px 14px 5px;padding:8px 14px;cursor:pointer;transition:.15s} .addbtn:hover{filter:brightness(1.08);box-shadow:0 0 14px rgba(84,210,196,.4)}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px} table.grid{border-collapse:collapse;width:100%;min-width:580px;font-size:13px}
  table.grid th{font-weight:800;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--space);text-align:left;background:var(--amber-soft);padding:9px 10px;white-space:nowrap} table.grid th.act{width:40px}
  table.grid td{padding:5px 7px;border-bottom:1px solid rgba(189,166,232,.1);vertical-align:top} table.grid tr:last-child td{border-bottom:0}
  table.grid input,table.grid textarea{border:1px solid transparent;background:transparent;padding:7px 8px;border-radius:5px} table.grid input:focus,table.grid textarea:focus{background:rgba(5,6,13,.78);border-color:var(--amber)} table.grid td .xbtn{width:30px;height:32px;font-size:14px}

  .subtabs{display:flex;gap:8px;margin:4px 0 12px;flex-wrap:wrap}
  .subtab{font-weight:800;font-size:13px;cursor:pointer;border:1px solid var(--line);background:rgba(189,166,232,.06);color:var(--muted);padding:9px 18px;border-radius:16px 6px 16px 6px;transition:.15s} .subtab:hover{background:rgba(189,166,232,.14)} .subtab.on{color:var(--space);border-color:transparent;background:var(--lav);box-shadow:0 0 14px rgba(189,166,232,.4)}
  .preset{border:1px dashed var(--line-amber);border-radius:9px;padding:14px 16px;margin-top:6px;background:rgba(240,169,59,.05)} .preset .ptitle{font-weight:800;font-size:13px;display:flex;align-items:center;gap:8px} .preset .pdesc{font-size:11.5px;color:var(--faint);margin:4px 0 12px}
  .levelseg{display:inline-flex;border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:12px} .levelseg button{font-weight:700;font-size:12px;padding:7px 16px;border:0;cursor:pointer;background:transparent;color:var(--muted);transition:.15s} .levelseg button.on{background:var(--amber);color:var(--space)}
  .presetgrid{display:flex;gap:8px;flex-wrap:wrap} .presetgrid button{font-weight:700;font-size:12px;padding:8px 14px;border-radius:14px 5px 14px 5px;border:1px solid var(--line);background:rgba(84,210,196,.08);color:var(--ivory);cursor:pointer;transition:.15s} .presetgrid button:hover{background:rgba(84,210,196,.2);border-color:var(--teal)} .presetgrid button.all{background:var(--rose);color:var(--space);border-color:transparent} .presetgrid button.rub{background:var(--lav);color:var(--space);border-color:transparent}

  .lead{color:var(--muted);font-size:13.5px;max-width:860px} .lead b{color:var(--amber-soft)}
  .kgrid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));margin-top:14px} .kcard{background:rgba(5,6,13,.5);border:1px solid var(--line);border-radius:8px;padding:13px 15px} .kcard .t{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--teal);margin-bottom:5px} .kcard p{margin:0;font-size:13px} .kcard .big{font-size:15px;font-weight:800;color:var(--ivory)}
  .order{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px} .ostep{display:flex;align-items:center;gap:8px;background:rgba(84,210,196,.08);border:1px solid var(--line);border-radius:16px;padding:7px 14px;font-size:13px} .ostep b{color:var(--teal)} .oarrow{color:var(--faint);font-family:var(--mono)}
  .toolcard{margin-top:16px;border-radius:9px;border:1px solid var(--line);overflow:hidden;background:rgba(5,6,13,.3)}
  .tier{display:grid;grid-template-columns:88px 1fr;border-top:1px solid var(--line)} .tier:first-of-type{border-top:0} .tier .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--faint);padding:11px 10px;background:rgba(5,6,13,.4);display:flex;align-items:flex-start} .tier .val{padding:11px 14px;font-size:13.5px} .tier.def .val{font-weight:700}
  .ramen{background:rgba(232,122,150,.07);border-left:3px solid var(--rose)} .ramen .val .nb{font-family:var(--mono);font-size:10px;color:var(--rose);letter-spacing:.08em;margin-left:6px} .oneword .val{color:var(--amber-soft);font-weight:700}
  .layer{padding:13px 14px 4px} .layer h4{margin:0 0 8px;font-size:13px;display:flex;align-items:center;gap:8px} .layer h4 .pill{font-family:var(--mono);font-size:9.5px;font-weight:800;letter-spacing:.06em;color:var(--space);padding:3px 9px;border-radius:10px} .pill.know{background:var(--lav)} .pill.do{background:var(--teal)} .pill.why{background:var(--amber)}
  .chk{display:flex;gap:9px;align-items:flex-start;padding:6px 4px;border-radius:6px;cursor:pointer;transition:.12s} .chk:hover{background:rgba(189,166,232,.06)} .chk input{margin-top:3px;width:16px;height:16px;accent-color:var(--teal);flex:none;cursor:pointer} .chk span{font-size:13px} .chk.checked span{color:var(--ok)}
  .why-note{font-size:12.5px;color:var(--muted);background:rgba(240,169,59,.06);border-left:3px solid var(--amber);padding:9px 13px;border-radius:0 6px 6px 0;margin:8px 4px 4px} .pitfall{font-size:12.5px;color:var(--muted);margin:8px 4px 6px;padding-left:4px} .pitfall b{color:var(--rose)} .toolprog{font-family:var(--mono);font-size:11px;color:var(--muted);margin:6px 0 0 4px}
  table.rub{border-collapse:collapse;width:100%;font-size:13px;margin-top:10px;overflow:hidden;border-radius:8px} table.rub th{background:var(--amber-soft);color:var(--space);font-weight:800;font-size:11px;text-align:left;padding:9px 11px} table.rub td{padding:9px 11px;border-bottom:1px solid rgba(189,166,232,.1);vertical-align:top} table.rub td:first-child{font-weight:700;white-space:nowrap;color:var(--teal)}
  .goal{margin-top:12px;font-size:13px;background:rgba(84,210,196,.08);border:1px solid var(--line);border-radius:8px;padding:11px 14px} .goal b{color:var(--teal)}

  .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap} .tab{font-weight:700;font-size:11.5px;letter-spacing:.04em;color:var(--muted);background:rgba(189,166,232,.07);border:1px solid var(--line);border-radius:13px 13px 0 0;padding:8px 15px;cursor:pointer;border-bottom:0;transition:.15s} .tab.active{color:var(--space);background:var(--teal);border-color:transparent}
  .out{font-family:var(--mono);font-size:12.5px;line-height:1.7;color:#e0e7f4;background:rgba(3,4,10,.74);border:1px solid var(--line);border-radius:8px;padding:16px 18px;white-space:pre-wrap;word-break:break-word;max-height:520px;overflow:auto}

<script>

const APP_VERSION="v5.0.0 PRO";   /* 環境自動判定の単一HTML（通常/セッション） */

/* ---- error log (最初に定義) ---- */
const errlog=[];
function logEvent(type,msg,extra){errlog.unshift({t:new Date().toLocaleString("ja-JP"),type,msg:String(msg),extra:extra?String(extra):""});if(errlog.length>250)errlog.pop();updateLogBadge();}
function errCount(){return errlog.filter(e=>e.type==="ERROR"||e.type==="PROMISE").length;}
function updateLogBadge(){const b=document.getElementById("btnLog");if(!b)return;const c=errCount();b.innerHTML="🩺 ログ"+(c?`<span class="dotbadge">${c}</span>`:"");}
window.addEventListener("error",e=>logEvent("ERROR",e.message,(e.filename||"")+":"+(e.lineno||"")));
window.addEventListener("unhandledrejection",e=>logEvent("PROMISE",(e.reason&&e.reason.message)||e.reason||"unknown",""));

/* ---- storage abstraction ---- */
let memStore={};
function lsOk(){try{localStorage.setItem("__t","1");localStorage.removeItem("__t");return true;}catch(e){return false;}}
const HAS_LS=lsOk();
const MODE_LABEL=HAS_LS?"通常モード（自動保存）":"セッションモード（メモリ）";
function sget(k){if(HAS_LS){try{return localStorage.getItem(k);}catch(e){logEvent("ERROR","storage.get "+k,e.message);return null;}}return (k in memStore)?memStore[k]:null;}
function sset(k,v){if(HAS_LS){try{localStorage.setItem(k,v);return true;}catch(e){logEvent("ERROR","storage.set "+k,e.message);return false;}}memStore[k]=v;return true;}

/* ============== DATA ============== */
const PROJECT_FIELDS=[

/* ============== STATE ============== */
const LS="usausa_bridge_suite_v4";

function blankState(){const s={project:{},data:{},capChecks:{},activeId:"ph1"};PROJECT_FIELDS.forEach(f=>s.project[f.key]="");PHASES.forEach(p=>{s.data[p.id]={};p.fields.forEach(f=>{if(f.type==="list")s.data[p.id][f.key]=[""];else if(f.type==="table")s.data[p.id][f.key]=[mkRow(f)];else s.data[p.id][f.key]="";});});return s;}
function mkRow(f){const r={};f.columns.forEach(c=>r[c.key]="");return r;}
function loadState(){try{const r=sget(LS);if(r)return migrate(JSON.parse(r));}catch(e){logEvent("ERROR","loadState",e.message);}return blankState();}
function migrate(s){if(!s.project)s.project={};PROJECT_FIELDS.forEach(f=>{if(s.project[f.key]==null)s.project[f.key]="";});if(!s.data)s.data={};if(!s.capChecks)s.capChecks={};PHASES.forEach(p=>{if(!s.data[p.id])s.data[p.id]={};p.fields.forEach(f=>{const c=s.data[p.id][f.key];if(f.type==="list"){if(!Array.isArray(c)||!c.length)s.data[p.id][f.key]=[""];}else if(f.type==="table"){if(!Array.isArray(c)||!c.length)s.data[p.id][f.key]=[mkRow(f)];}else{if(c==null)s.data[p.id][f.key]="";}});});s.activeId=s.activeId||"ph1";return s;}
function persist(){try{sset(LS,JSON.stringify(state));}catch(e){logEvent("ERROR","persist",e.message);}}
function activePhase(){return PHASES.find(x=>x.id===activeId);}

/* ============== HELPERS ============== */
const $=s=>document.querySelector(s);
function stripTags(s){return (s||"").replace(/<[^>]+>/g,"");}
let toastT;
function toast(m,big,isErr){const t=$("#toast");t.textContent=m;t.className="toast show"+(big?" big":"")+(isErr?" err":"");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),big?2600:1900);}
function copyText(t){try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast("コピーしました"),()=>fbc(t));}else fbc(t);}catch(e){logEvent("ERROR","copy",e.message);fbc(t);}}
function fbc(t){try{const a=document.createElement("textarea");a.value=t;a.style.position="fixed";a.style.opacity="0";document.body.appendChild(a);a.select();document.execCommand("copy");document.body.removeChild(a);toast("コピーしました");}catch(e){logEvent("ERROR","copy fallback",e.message);toast("コピー失敗（ログ参照）",false,true);}}
function download(n,t,m){try{const b=new Blob([t],{type:m||"text/plain;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),1500);logEvent("INFO","download: "+n);}catch(e){logEvent("ERROR","download "+n,e.message);toast("ダウンロード失敗（ログ参照）",false,true);}}
function safeName(s){return (s||"案件").replace(/[\\/:*?"<>|]/g,"").replace(/\s+/g,"_")||"案件";}

/* ============== PROGRESS ============== */
function phaseFilled(p){let total=0,filled=0;p.fields.forEach(f=>{const v=state.data[p.id][f.key];if(f.type==="list"){total++;if(v.some(x=>x.trim()))filled++;}else if(f.type==="table"){total++;if(v.some(r=>Object.values(r).some(x=>(x||"").trim())))filled++;}else{total++;if((v||"").trim())filled++;}});return{total,filled,pct:total?Math.round(filled/total*100):0};}
function globalProgress(){let t=0,f=0;PHASES.forEach(p=>{const r=phaseFilled(p);t+=r.total;f+=r.filled;});const pm=PROJECT_FIELDS.filter(x=>(state.project[x.key]||"").trim()).length;t+=1;f+=(pm>=3?1:pm/3);return Math.round(f/t*100);}

const EMO=["✨","🐰","🌟","💫","⭐","🎉"];let celebratedPhase={},celebratedAll=false;
function spawnParticles(n){const fx=$("#fx");for(let i=0;i<n;i++){const e=document.createElement("div");e.className="pcl";e.textContent=EMO[Math.floor(Math.random()*EMO.length)];e.style.left=(38+Math.random()*24)+"%";e.style.top="34%";e.style.setProperty("--dx",(Math.random()*360-180)+"px");e.style.setProperty("--dy",(120+Math.random()*220)+"px");e.style.setProperty("--rot",(Math.random()*540-270)+"deg");e.style.animationDelay=(Math.random()*.18)+"s";fx.appendChild(e);setTimeout(()=>e.remove(),1750);}}
function flash(){const f=document.createElement("div");f.className="flash";document.body.appendChild(f);setTimeout(()=>f.remove(),750);}
function celebrate(p){flash();spawnParticles(16);toast(`${p.code} 入力コンプリート！🎉`);chord([523,659,784]);}

let actx=null,sfxOn=false;
function ensureAudio(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){logEvent("ERROR","AudioContext",e.message);}}}
function blip(freq,dur,type){if(!sfxOn||!actx)return;try{const o=actx.createOscillator(),g=actx.createGain();o.type=type||"sine";o.frequency.value=freq;g.gain.setValueAtTime(0.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.12,actx.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+(dur||0.12));o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+(dur||0.12)+0.02);}catch(e){}}
function chord(fr){if(!sfxOn||!actx)return;fr.forEach((f,i)=>setTimeout(()=>blip(f,0.35,"triangle"),i*70));}

function renderNav(){const wrap=$("#modules");wrap.innerHTML="";PHASES.forEach(p=>{const pr=phaseFilled(p);const done=pr.pct>=70;if(pr.pct===100&&!celebratedPhase[p.id]){celebratedPhase[p.id]=true;celebrate(p);}if(pr.pct<100)celebratedPhase[p.id]=false;const b=document.createElement("button");b.className="mod"+(p.id===activeId?" active":"")+(done?" done":"");b.innerHTML=`<div class="lamp">${done?"✓":p.code.split("-")[1]}</div><div class="mtxt"><div class="mcode">${p.code}</div><div class="mname">${stripTags(p.title)}</div><div class="mprog">${pr.filled}/${pr.total} ・ ${pr.pct}%</div></div>`;b.onclick=()=>{activeId=p.id;state.activeId=p.id;persist();blip(560,0.08);renderNav();renderStage();window.scrollTo({top:0,behavior:"smooth"});};wrap.appendChild(b);});const g=globalProgress();$("#globalMeter").style.width=g+"%";$("#globalPct").textContent=g+"%";if(g>=100&&!celebratedAll){celebratedAll=true;bigCelebrate();}if(g<100)celebratedAll=false;}

const HEAD_COLORS=["amber","teal","lav","rose","amber","teal"];
function renderStage(){const p=activePhase();const stage=$("#stage");stage.innerHTML="";stage.appendChild(renderProjectPanel());const idx=PHASES.indexOf(p),col=HEAD_COLORS[idx%6];const panel=document.createElement("section");panel.className="panel stagein";panel.innerHTML=`<div class="phead"><div class="blk blk-${col}"><b>${p.code.split("-")[1]}</b></div><div class="ht"><div class="ec">${p.code} ／ MISSION MODULE</div><h2>${p.glyph} ${stripTags(p.title)}</h2><div class="phase-mission">${p.mission}</div></div><div class="lamps"><i class="l-amber"></i><i class="l-teal"></i><i class="l-rose"></i></div></div><div class="pbody"></div>`;const body=panel.querySelector(".pbody");
  if(p.cap){const st=document.createElement("div");st.className="subtabs";st.innerHTML=`<button class="subtab ${ph2view==='design'?'on':''}" data-v="design">✍️ 設計する</button><button class="subtab ${ph2view==='learn'?'on':''}" data-v="learn">📖 学ぶ（マップ）</button>`;body.appendChild(st);setTimeout(()=>st.querySelectorAll(".subtab").forEach(b=>b.onclick=()=>{ph2view=b.dataset.v;blip(620,0.07);renderStage();}),0);if(ph2view==="design"){body.appendChild(renderPresetBay());p.fields.forEach(f=>body.appendChild(renderField(p,f)));}else renderCapMap(body);}
  else p.fields.forEach(f=>body.appendChild(renderField(p,f)));
  stage.appendChild(panel);stage.appendChild(renderDock(p));}
function renderProjectPanel(){const sec=document.createElement("section");sec.className="panel stagein";sec.innerHTML=`<div class="phead"><div class="blk blk-teal"><b>REG</b></div><div class="ht"><div class="ec">PROJECT REGISTRY</div><h2 style="font-size:15px">案件レジストリ <span style="font-size:12px;color:var(--muted);font-weight:400">／ 全フェーズ共通・役職名で</span></h2></div><div class="lamps"><i class="l-teal"></i><i class="l-amber"></i></div></div><div class="pbody"><div class="pg"></div></div>`;const g=sec.querySelector(".pg");g.style.display="grid";g.style.gap="12px";g.style.gridTemplateColumns="repeat(auto-fit,minmax(210px,1fr))";PROJECT_FIELDS.forEach(f=>{const c=document.createElement("div");c.innerHTML=`<label class="flabel" style="font-size:12px;font-weight:700;display:block;margin-bottom:5px">${f.label}</label>`;const i=document.createElement("input");i.type="text";i.placeholder=f.ph;i.value=state.project[f.key]||"";i.oninput=e=>{state.project[f.key]=e.target.value;persist();renderNav();};c.appendChild(i);g.appendChild(c);});return sec;}

function renderPresetBay(){const bay=document.createElement("div");bay.className="preset";bay.innerHTML=`<div class="ptitle">🛸 標準スキルセット・プリセット</div><div class="pdesc">Cursor／Claude Code／マルチエージェント／RAG を3層で投入。投入後は案件に合わせて編集してください。</div><div class="levelseg" id="lvlseg"><button data-lv="beginner" class="${capLevel==='beginner'?'on':''}">初心者向け</button><button data-lv="practical" class="${capLevel==='practical'?'on':''}">実務向け</button></div><div class="presetgrid" id="pg2"></div>`;setTimeout(()=>{bay.querySelectorAll("#lvlseg button").forEach(b=>b.onclick=()=>{capLevel=b.dataset.lv;blip(600,0.07);renderStage();});const g=bay.querySelector("#pg2");CAP_TOOLS[capLevel].forEach(t=>{const b=document.createElement("button");b.textContent="＋ "+t.name;b.onclick=()=>injectTool(t);g.appendChild(b);});const all=document.createElement("button");all.className="all";all.textContent="⊕ 4ツール一括";all.onclick=injectAll;g.appendChild(all);const rub=document.createElement("button");rub.className="rub";rub.textContent="⊕ 標準ルーブリック";rub.onclick=injectRubric;g.appendChild(rub);},0);return bay;}
function toolRow(t){return {tool:t.name,knowledge:t.know.join("／"),practice:t.doo.join("／"),philosophy:t.why.join("／")};}
function clearSingleEmpty(a){if(a.length===1&&Object.values(a[0]).every(x=>!(x||"").trim()))a.length=0;}
function injectTool(t){const a=state.data.ph2.tools;clearSingleEmpty(a);if(a.some(r=>(r.tool||"").trim()===t.name)){toast(t.name+" は投入済み");return;}a.push(toolRow(t));persist();blip(720,0.1,"triangle");renderStage();renderNav();toast(`${t.name}（${capLevel==='beginner'?'初心者':'実務'}）を投入`);}
function injectAll(){const a=state.data.ph2.tools;clearSingleEmpty(a);let n=0;CAP_TOOLS[capLevel].forEach(t=>{if(!a.some(r=>(r.tool||"").trim()===t.name)){a.push(toolRow(t));n++;}});persist();chord([523,659]);renderStage();renderNav();toast(`4ツール投入：新規${n}件`);}
function injectRubric(){const a=state.data.ph2.rubric;clearSingleEmpty(a);RUBRIC_PRESET.forEach(r=>{if(!a.some(x=>(x.level||"").trim()===r.level))a.push({level:r.level,def:r.def,behavior:r.behavior});});persist();blip(700,0.1,"triangle");renderStage();renderNav();toast("標準ルーブリック(L1–L4)を投入");}

function capKey(lv,tid,layer,i){return lv+"_"+tid+"_"+layer+"_"+i;}
function capChk(lv,tid,layer,i,label){const k=capKey(lv,tid,layer,i),on=!!state.capChecks[k],id="cc_"+k;return `<label class="chk ${on?'checked':''}" for="${id}"><input type="checkbox" id="${id}" data-ck="${k}" ${on?'checked':''}><span>${label}</span></label>`;}
function capToolProg(lv,t){let d=0;t.doo.forEach((_,i)=>{if(state.capChecks[capKey(lv,t.id,"do",i)])d++;});return d+"/"+t.doo.length;}
function renderCapMap(host){const lvtabs=document.createElement("div");lvtabs.className="subtabs";lvtabs.style.marginTop="2px";lvtabs.innerHTML=`<button class="subtab ${capLevel==='beginner'?'on':''}" data-lv="beginner">🌱 初心者向け</button><button class="subtab ${capLevel==='practical'?'on':''}" data-lv="practical">🛠 実務向け</button><button class="addbtn" id="injHere" style="margin:0 0 0 auto;align-self:center">⊕ この内容を「設計する」に投入</button>`;host.appendChild(lvtabs);setTimeout(()=>{lvtabs.querySelectorAll(".subtab").forEach(b=>b.onclick=()=>{capLevel=b.dataset.lv;blip(600,0.07);renderStage();});$("#injHere").onclick=()=>{ph2view="design";injectAll();injectRubric();};},0);
  const intro=INTRO[capLevel];const ip=document.createElement("div");ip.className="toolcard";ip.style.marginTop="10px";ip.style.padding="14px 16px";ip.innerHTML=`<p class="lead">${intro.lead}</p><div class="kgrid">${intro.cards.map(c=>`<div class="kcard"><div class="t">${c.t}</div><p>${c.h}</p></div>`).join("")}</div><div class="order">${intro.order.map((o,i)=>`<div class="ostep">${o}</div>${i<intro.order.length-1?'<span class="oarrow">▸</span>':''}`).join("")}</div>`;host.appendChild(ip);
  CAP_TOOLS[capLevel].forEach(t=>{const c=document.createElement("div");c.className="toolcard";c.innerHTML=`<div class="phead"><div class="blk blk-${t.color}"><b>${t.code}</b></div><div class="ht"><div class="ec">AI TOOL ／ ${capLevel==='beginner'?'初心者':'実務'}</div><h2 style="font-size:16px">🍜 ${t.name} <span style="font-size:12px;color:var(--muted);font-weight:400">— ${t.role}</span></h2></div><div class="lamps"><i class="l-${t.color}"></i><i class="l-teal"></i></div></div><div class="tier def"><div class="lbl">定義</div><div class="val">${t.def}</div></div><div class="tier ramen"><div class="lbl">たとえ🍜</div><div class="val">${t.ramen}<span class="nb">※不正確</span></div></div><div class="tier"><div class="lbl">詳細</div><div class="val">${t.detail}</div></div><div class="tier oneword"><div class="lbl">一言</div><div class="val">${t.oneword}</div></div><div class="why-note">💡 <b>なぜ学ぶ？</b> ${t.whyLearn}</div><div class="layer"><h4><span class="pill know">知識</span> ${capLevel==='beginner'?'知っている':'仕組みを説明できる'}</h4>${t.know.map((x,i)=>capChk(capLevel,t.id,"know",i,x)).join("")}</div><div class="layer"><h4><span class="pill do">実践</span> ${capLevel==='beginner'?'できる':'設計・改善できる'}</h4>${t.doo.map((x,i)=>capChk(capLevel,t.id,"do",i,x)).join("")}<div class="toolprog">実践チェック：<span id="ctp_${t.id}">${capToolProg(capLevel,t)}</span></div></div><div class="layer"><h4><span class="pill why">設計思想</span> なぜそう使うか</h4>${t.why.map((x,i)=>capChk(capLevel,t.id,"why",i,x)).join("")}</div><div class="pitfall">⚠️ <b>つまずき</b>：${t.pitfall}</div>`;host.appendChild(c);});
  const rb=document.createElement("div");rb.className="toolcard";rb.style.padding="14px 16px";rb.innerHTML=`<h2 style="font-size:15px;margin:0 0 6px">評価ルーブリック（共通）</h2><table class="rub"><thead><tr><th>レベル</th><th>定義</th><th>観察される行動の例</th></tr></thead><tbody>${RUBRIC_ROWS.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join("")}</tbody></table><div class="goal">${RUBRIC_GOAL[capLevel]}</div>`;host.appendChild(rb);
  setTimeout(()=>{host.querySelectorAll('input[type=checkbox][data-ck]').forEach(cb=>cb.onchange=()=>{const k=cb.dataset.ck;state.capChecks[k]=cb.checked;persist();cb.closest(".chk").classList.toggle("checked",cb.checked);blip(cb.checked?740:420,0.06);const tid=k.split("_")[1];const t=CAP_TOOLS[capLevel].find(x=>x.id===tid);if(t){const el=$("#ctp_"+tid);if(el)el.textContent=capToolProg(capLevel,t);}});},0);}

/* ============== FIELDS ============== */
function renderField(p,f){const w=document.createElement("div");w.className="field";const tag=f.type==="table"?"TABLE":f.type==="list"?"LIST":"TEXT";w.innerHTML=`<label class="flabel">${stripTags(f.label)}<span class="tag">${tag}</span></label>`+(f.hint?`<div class="hint">${f.hint}</div>`:"");if(f.type==="text"||f.type==="textarea"){const el=document.createElement(f.type==="text"?"input":"textarea");if(f.type==="text")el.type="text";el.placeholder=f.ph||"";el.value=state.data[p.id][f.key]||"";el.oninput=e=>{state.data[p.id][f.key]=e.target.value;persist();syncDock(p);renderNav();};w.appendChild(el);}else if(f.type==="list")w.appendChild(renderList(p,f));else if(f.type==="table")w.appendChild(renderTable(p,f));return w;}
function renderList(p,f){const box=document.createElement("div"),rows=document.createElement("div");rows.className="listrows";const arr=state.data[p.id][f.key];arr.forEach((v,i)=>{const row=document.createElement("div");row.className="listrow";const idx=document.createElement("div");idx.className="idx";idx.textContent=(i+1).toString().padStart(2,"0");const inp=document.createElement("input");inp.type="text";inp.placeholder=f.ph||"";inp.value=v;inp.oninput=e=>{arr[i]=e.target.value;persist();syncDock(p);renderNav();};const x=document.createElement("button");x.className="xbtn";x.textContent="×";x.onclick=()=>{arr.splice(i,1);if(!arr.length)arr.push("");renderStage();renderNav();};row.appendChild(idx);row.appendChild(inp);row.appendChild(x);rows.appendChild(row);});box.appendChild(rows);const add=document.createElement("button");add.className="addbtn";add.textContent="＋ 行を追加";add.onclick=()=>{arr.push("");blip(560,0.06);renderStage();renderNav();};box.appendChild(add);return box;}
function renderTable(p,f){const box=document.createElement("div"),tw=document.createElement("div");tw.className="tablewrap";const tbl=document.createElement("table");tbl.className="grid";const th=document.createElement("thead");let h="<tr>";f.columns.forEach(c=>h+=`<th>${c.label}</th>`);h+=`<th class="act"></th></tr>`;th.innerHTML=h;tbl.appendChild(th);const tb=document.createElement("tbody");const arr=state.data[p.id][f.key];arr.forEach((rd,i)=>{const tr=document.createElement("tr");f.columns.forEach(c=>{const td=document.createElement("td");const el=document.createElement(c.type==="textarea"?"textarea":"input");if(c.type!=="textarea")el.type="text";el.placeholder=c.ph||"";el.value=rd[c.key]||"";if(c.type==="textarea")el.rows=2;el.oninput=e=>{rd[c.key]=e.target.value;persist();syncDock(p);renderNav();};td.appendChild(el);tr.appendChild(td);});const tdx=document.createElement("td");const x=document.createElement("button");x.className="xbtn";x.textContent="×";x.onclick=()=>{arr.splice(i,1);if(!arr.length)arr.push(mkRow(f));renderStage();renderNav();};tdx.appendChild(x);tr.appendChild(tdx);tb.appendChild(tr);});tbl.appendChild(tb);tw.appendChild(tbl);box.appendChild(tw);const add=document.createElement("button");add.className="addbtn";add.textContent="＋ 行を追加";add.onclick=()=>{arr.push(mkRow(f));blip(560,0.06);renderStage();renderNav();};box.appendChild(add);return box;}

/* ============== DOCK ============== */
let dockTab="doc";
function renderDock(p){const sec=document.createElement("section");sec.className="panel stagein";sec.innerHTML=`<div class="phead"><div class="blk blk-rose"><b>OUT</b></div><div class="ht"><div class="ec">OUTPUT</div><h2 style="font-size:15px">⚙ 生成ドック</h2></div><div class="lamps"><i class="l-rose"></i><i class="l-amber"></i><i class="l-teal"></i></div></div><div class="pbody"><div class="tabs"><button class="tab ${dockTab==="doc"?"active":""}" data-t="doc">📄 実務ドキュメント</button><button class="tab ${dockTab==="prompt"?"active":""}" data-t="prompt">🤖 Claude投入プロンプト</button></div><pre class="out" id="dockOut"></pre><div class="dock-actions"><button class="hud rose" id="dockCopy">⧉ コピー</button><button class="hud ghost" id="dockDl">⤓ .md</button><button class="hud teal" id="dockExport">📤 出力（MD/TXT/PDF/CSV）</button></div></div>`;setTimeout(()=>{sec.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{dockTab=t.dataset.t;blip(620,0.07);renderStage();});$("#dockOut").textContent=dockTab==="doc"?genPhaseDoc(p):genPhasePrompt(p);$("#dockCopy").onclick=()=>copyText($("#dockOut").textContent);$("#dockDl").onclick=()=>{const tag=dockTab==="doc"?"":"_prompt";download(`${p.code}_${stripTags(p.title)}${tag}.md`,$("#dockOut").textContent,"text/markdown;charset=utf-8");};$("#dockExport").onclick=()=>openExport("phase");},0);return sec;}
function syncDock(p){const o=$("#dockOut");if(o)o.textContent=dockTab==="doc"?genPhaseDoc(p):genPhasePrompt(p);}

/* ============== GENERATORS (MD) ============== */
function pm(){return state.project;}
function projectHeaderMd(){const m=pm(),l=(a,v)=>v&&v.trim()?`- **${a}**：${v.trim()}\n`:"";return (l("案件名",m.name)+l("クライアント/組織",m.client)+l("想定期間",m.period)+l("メイン講師",m.main)+l("サブ講師",m.sub)+l("対象者",m.audience))||"- （案件メタ未入力）\n";}
function listMd(a){const it=a.filter(x=>x.trim());return it.length?it.map(x=>`- ${x.trim()}`).join("\n")+"\n":"- （未入力）\n";}
function tableMd(f,a){const rows=a.filter(r=>Object.values(r).some(x=>(x||"").trim()));if(!rows.length)return "（未入力）\n";const h=f.columns.map(c=>c.label);let s="| "+h.join(" | ")+" |\n| "+h.map(()=>"---").join(" | ")+" |\n";rows.forEach(r=>{s+="| "+f.columns.map(c=>(r[c.key]||"").replace(/\n/g,"<br>").replace(/\|/g,"\\|")||"-").join(" | ")+" |\n";});return s;}
function fieldMd(p,f){const v=state.data[p.id][f.key];let s=`### ${stripTags(f.label)}\n`;if(f.hint)s+=`> ${f.hint}\n\n`;if(f.type==="list")s+=listMd(v);else if(f.type==="table")s+=tableMd(f,v);else s+=(v&&v.trim()?v.trim()+"\n":"（未入力）\n");return s+"\n";}
function genPhaseDoc(p){let s=`# ${p.code}｜${stripTags(p.title)}\n\n> **ミッション**：${stripTags(p.mission)}\n\n## 📌 案件メタ\n${projectHeaderMd()}\n## 🎯 結論ファースト\n${phaseConclusion(p)}\n\n## 📂 詳細\n`;p.fields.forEach(f=>s+=fieldMd(p,f));s+=`---\n*Generated by うさうさ宇宙船ブリッジ・スイート ${APP_VERSION} 🐰 ／ 事実と所感は分けて記載してください。*\n`;return s;}
function phaseConclusion(p){const d=state.data[p.id];const m={ph1:()=>{const k=(d.kpis||[]).filter(r=>r.item&&r.item.trim()).map(r=>r.item.trim());return k.length?`本研修のゴールは「${k.slice(0,3).join("」「")}」。これらKPIから逆算して全フェーズを設計する。`:`（KPIを入力すると逆算ゴールが要約されます）`;},ph2:()=>{const t=(d.tools||[]).filter(r=>r.tool&&r.tool.trim()).map(r=>r.tool.trim());return t.length?`対象ツール（${t.join(" / ")}）を3層で分解し、ルーブリックで到達度を測る。`:`（ツールを投入/入力すると要約されます）`;},ph3:()=>d.philosophy&&d.philosophy.trim()?`設計思想「${d.philosophy.trim()}」を軸に、AI採点ループ込みの演習で“なぜ”まで体得させる。`:`（教材の設計思想を入力すると要約されます）`,ph4:()=>d.scope&&d.scope.trim()?`${d.scope.trim()} ／ 評価は「実務で使えた」を基準に実測FBを収集。`:`（パイロット規模を入力すると要約されます）`,ph5:()=>{const it=(d.pkg||[]).filter(r=>r.item&&r.item.trim()).map(r=>r.item.trim());return it.length?`「${it.join("」「")}」を再現パッケージ化し横展開する。`:`（パッケージ要素を入力すると要約されます）`;},ph6:()=>d.share&&d.share.trim()?`四半期アップデート＋ナレッジ共有会で陳腐化を防ぐ。${d.share.trim()}`:`（共有会運用を入力すると要約されます）`,};return(m[p.id]||(()=>""))();}
function genPhasePrompt(p){const c=`あなたは一流のIT研修設計コンサルタントです。AI研修導入プロジェクトの「${p.code} ${stripTags(p.title)}」フェーズを現役講師として実務レビューしてください。`;return[c,"","# プロジェクト前提\n"+projectHeaderMd(),"","# このフェーズの現状入力\n"+p.fields.map(f=>fieldMd(p,f)).join(""),"# 依頼",ask(p),"","# 出力条件","- 結論ファースト。事実と所感（推論）は明示的に分ける。","- 一般論でなく入力内容に即した具体的な指摘に。","- 数値の捏造禁止。根拠が弱い箇所は「要検証」と明記。"].join("\n");}
function ask(p){const m={ph1:`1) KPIが測定可能か検証し曖昧なものは具体化案。\n2) 実務課題とKPIの紐付けの飛躍を指摘。\n3) 不足ゴールを追加提案。`,ph2:`1) 各ツールの3層に抜け漏れ/混同がないか指摘。\n2) ルーブリックが「行動」で測れているか検証し改善案。\n3) 追加すべき評価軸を提案。`,ph3:`1) 教材が設計思想(WHY)と整合しているか。\n2) AI採点ループが機能する設計か具体的にレビュー。\n3) 難易度・想定時間の妥当性を指摘。`,ph4:`1) 評価基準が「実務で使えた」を測れているか。\n2) パイロット規模/対象の妥当性とバイアスを指摘。\n3) FB項目の過不足を提案。`,ph5:`1) 再現パッケージで属人化が解けているか。\n2) 進行台本の抜けを指摘。\n3) 横展開で壊れやすい箇所と対策。`,ph6:`1) 四半期運用にトリガー/担当の抜けがないか。\n2) 共有会がブレームレスに設計されているか。\n3) ウォッチ指標の過不足を提案。`,};return m[p.id]||"このフェーズの設計をレビューし改善案を提示してください。";}
function genFullDoc(){let s=`# 🐰 AI研修 導入ロードマップ ／ うさうさ宇宙船ブリッジ・スイート\n\n## 📌 案件メタ\n${projectHeaderMd()}\n## 🗺️ 全体像（6フェーズ）\n| フェーズ | 内容 | 進捗 |\n| --- | --- | --- |\n`;PHASES.forEach(p=>{const pr=phaseFilled(p);s+=`| ${p.code} | ${stripTags(p.title)} | ${pr.pct}% |\n`;});s+="\n---\n\n";PHASES.forEach(p=>s+=genPhaseDoc(p)+"\n");return s;}
function genCapMd(){let s=`# 🗺️ ケイパビリティマップ（初心者／実務）\n\n`;["beginner","practical"].forEach(lv=>{s+=`## ${lv==="beginner"?"🌱 初心者向け":"🛠 実務向け"}\n\n`;CAP_TOOLS[lv].forEach(t=>{s+=`### 🍜 ${t.name}（${t.role}）\n- **定義**：${t.def}\n- **たとえ🍜（※不正確）**：${t.ramen}\n- **一言**：${t.oneword}\n\n**知識**\n${t.know.map((x,i)=>`- [${state.capChecks[capKey(lv,t.id,"know",i)]?"x":" "}] ${x}`).join("\n")}\n\n**実践**\n${t.doo.map((x,i)=>`- [${state.capChecks[capKey(lv,t.id,"do",i)]?"x":" "}] ${x}`).join("\n")}\n\n**設計思想**\n${t.why.map((x,i)=>`- [${state.capChecks[capKey(lv,t.id,"why",i)]?"x":" "}] ${x}`).join("\n")}\n\n`;});s+=`### ルーブリック\n| レベル | 定義 | 観察される行動 |\n| --- | --- | --- |\n${RUBRIC_ROWS.map(r=>`| ${r[0]} | ${r[1]} | ${r[2]} |`).join("\n")}\n\n`;});s+=`---\n*🍜のたとえは入口用で※不正確。仕様は公式で最新確認を。*\n`;return s;}

/* ============== FORMAT CONVERTERS ============== */
function mdToPlain(md){return md.replace(/^### (.*)$/gm,"■ $1").replace(/^## (.*)$/gm,"◆ $1").replace(/^# (.*)$/gm,"【$1】").replace(/^> (.*)$/gm,"  » $1").replace(/\*\*(.+?)\*\*/g,"$1").replace(/<br>/g," / ").replace(/^\|[\s:|-]+\|$/gm,"").replace(/\|/g,"│").replace(/^---$/gm,"————————————————————————————");}
function escH(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function inlineH(s){return escH(s).replace(/&lt;br&gt;/g,"<br>").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");}
function mdToHtml(md){const lines=md.split("\n");let html="",i=0;
  function flushList(buf){if(buf.length){html+="<ul>"+buf.map(x=>"<li>"+inlineH(x)+"</li>").join("")+"</ul>";}}
  while(i<lines.length){let ln=lines[i];
    if(/^### /.test(ln)){html+="<h3>"+inlineH(ln.slice(4))+"</h3>";i++;continue;}
    if(/^## /.test(ln)){html+="<h2>"+inlineH(ln.slice(3))+"</h2>";i++;continue;}
    if(/^# /.test(ln)){html+="<h1>"+inlineH(ln.slice(2))+"</h1>";i++;continue;}
    if(/^---\s*$/.test(ln)){html+="<hr>";i++;continue;}
    if(/^>\s?/.test(ln)){let b=[];while(i<lines.length&&/^>\s?/.test(lines[i])){b.push(lines[i].replace(/^>\s?/,""));i++;}html+="<blockquote>"+b.map(inlineH).join("<br>")+"</blockquote>";continue;}
    if(/^\|/.test(ln)){let rows=[];while(i<lines.length&&/^\|/.test(lines[i])){rows.push(lines[i]);i++;}
      const cells=r=>r.replace(/^\||\|$/g,"").split("|").map(x=>x.trim());
      let head=cells(rows[0]);let bodyRows=rows.slice(1).filter(r=>!/^\|[\s:|-]+\|$/.test(r));
      html+="<table><thead><tr>"+head.map(h=>"<th>"+inlineH(h)+"</th>").join("")+"</tr></thead><tbody>"+bodyRows.map(r=>"<tr>"+cells(r).map(c=>"<td>"+inlineH(c)+"</td>").join("")+"</tr>").join("")+"</tbody></table>";continue;}
    if(/^- /.test(ln)){let b=[];while(i<lines.length&&/^- /.test(lines[i])){b.push(lines[i].slice(2));i++;}flushList(b);continue;}
    if(/^\s*$/.test(ln)){i++;continue;}
    html+="<p>"+inlineH(ln)+"</p>";i++;}
  return html;}

function csvCell(s){s=(s==null?"":String(s));if(/[",\n\r]/.test(s))s='"'+s.replace(/"/g,'""')+'"';return s;}
function csvFrom(rows){return "\uFEFF"+rows.map(r=>r.map(csvCell).join(",")).join("\r\n");}
function csvData(scope){const rows=[["フェーズ","セクション","行/番号","列","値"]];if(scope!=="phase")PROJECT_FIELDS.forEach(f=>rows.push(["（案件メタ）",f.label,"","",state.project[f.key]||""]));const ps=scope==="phase"?[activePhase()]:PHASES;ps.forEach(p=>{const ph=p.code+" "+stripTags(p.title);p.fields.forEach(f=>{const v=state.data[p.id][f.key];const lbl=stripTags(f.label);if(f.type==="text"||f.type==="textarea")rows.push([ph,lbl,"","",v||""]);else if(f.type==="list"){const it=v.filter(x=>x.trim());if(it.length)it.forEach((x,i)=>rows.push([ph,lbl,String(i+1),"",x]));else rows.push([ph,lbl,"","",""]);}else if(f.type==="table"){const dr=v.filter(r=>Object.values(r).some(x=>(x||"").trim()));if(dr.length)dr.forEach((rd,i)=>f.columns.forEach(c=>rows.push([ph,lbl,String(i+1),c.label,rd[c.key]||""])));else rows.push([ph,lbl,"","",""]);}});});return csvFrom(rows);}
function csvCap(){const rows=[["レベル","ツール","層","項目","チェック"]];["beginner","practical"].forEach(lv=>{CAP_TOOLS[lv].forEach(t=>{[["know","知識",t.know],["do","実践",t.doo],["why","設計思想",t.why]].forEach(([layer,jp,arr])=>{arr.forEach((x,i)=>rows.push([lv==="beginner"?"初心者":"実務",t.name,jp,x,state.capChecks[capKey(lv,t.id,layer,i)]?"✓":""]));});});});return csvFrom(rows);}

/* ============== EXPORT CENTER ============== */
let exportScope="phase";
function openExport(scope){exportScope=scope||"full";const html=`
  <p class="lead">出力スコープと形式を選んでください。PDFは印刷ダイアログから「PDFとして保存」を選べます。</p>
  <h3>出力スコープ</h3>
  <div class="seg" id="scopeSeg">
    <button data-s="phase" class="${exportScope==='phase'?'on':''}">このフェーズ</button>
    <button data-s="full" class="${exportScope==='full'?'on':''}">全フェーズ統合</button>
    <button data-s="cap" class="${exportScope==='cap'?'on':''}">ケイパビリティ自己チェック</button>
  </div>
  <h3>形式を選んでダウンロード</h3>
  <div class="fmtgrid">
    <div class="fmtbtn" data-f="md"><b>📄 Markdown (.md)</b><span>Notion・報告書に貼れる</span></div>
    <div class="fmtbtn" data-f="txt"><b>📝 テキスト (.txt)</b><span>装飾なしのプレーン</span></div>
    <div class="fmtbtn" data-f="pdf"><b>🧾 PDF（印刷）</b><span>印刷→PDF保存</span></div>
    <div class="fmtbtn" data-f="csv"><b>📊 CSV (.csv)</b><span>Excel/スプレッドシート</span></div>
  </div>
  <div class="note">CSVはBOM付きUTF-8でExcelの文字化けを防いでいます。PDFは現在の見た目ではなく、読みやすい印刷用レイアウトで出力されます。</div>`;
  openModal("📤 出力センター",html,()=>{
    $("#scopeSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>{exportScope=b.dataset.s;$("#scopeSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));});
    document.querySelectorAll(".fmtbtn").forEach(b=>b.onclick=()=>doExport(exportScope,b.dataset.f));
  },"EXPORT");
}
function scopeMd(scope){return scope==="full"?genFullDoc():scope==="cap"?genCapMd():genPhaseDoc(activePhase());}
function scopeBase(scope){const nm=safeName(pm().name);return scope==="full"?`AI研修ロードマップ_統合_${nm}`:scope==="cap"?`ケイパビリティマップ_${nm}`:`${activePhase().code}_${stripTags(activePhase().title)}`;}
function doExport(scope,fmt){try{
  const base=scopeBase(scope);
  if(fmt==="md"){download(base+".md",scopeMd(scope),"text/markdown;charset=utf-8");chord([523,659]);toast("Markdownを出力しました");closeModal();}
  else if(fmt==="txt"){download(base+".txt",mdToPlain(scopeMd(scope)),"text/plain;charset=utf-8");toast("テキストを出力しました");closeModal();}
  else if(fmt==="csv"){const csv=scope==="cap"?csvCap():csvData(scope);download(base+".csv",csv,"text/csv;charset=utf-8");toast("CSVを出力しました");closeModal();}
  else if(fmt==="pdf"){closeModal();setTimeout(()=>exportPDF(scope),120);}
}catch(e){logEvent("ERROR","doExport "+scope+"/"+fmt,e.message);toast("出力に失敗（ログ参照）",false,true);}}
function exportPDF(scope){try{const html=mdToHtml(scopeMd(scope));$("#printroot").innerHTML=html;document.body.classList.add("printing");logEvent("INFO","PDF印刷 "+scope);window.print();}catch(e){logEvent("ERROR","exportPDF",e.message);toast("PDF出力に失敗（ログ参照）",false,true);document.body.classList.remove("printing");}}
window.addEventListener("afterprint",()=>document.body.classList.remove("printing"));

/* ============== MODAL SYSTEM ============== */
function openModal(title,html,onMount,tag){$("#modalTitle").textContent=title;$("#modalTag").textContent=tag||"INFO";$("#modalBody").innerHTML=html;$("#overlay").classList.add("open");if(onMount)try{onMount();}catch(e){logEvent("ERROR","modal mount",e.message);}}
function closeModal(){$("#overlay").classList.remove("open");}
$("#modalClose").onclick=closeModal;$("#overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

/* ============== SNAPSHOT MODAL ============== */

function openSnap(){const note=HAS_LS?`この端末のブラウザに保存され、次回も復元できます。長期保存・共有は <b>JSON保存</b> を併用してください。`:`<b>アーティファクト版</b>のためセッション内のみ保持されます（リロードで消えます）。確実な保全は <b>JSON保存</b> またはローカル版をご利用ください。`;
  const html=`<p class="lead">編集の節目で<b>一次保存（スナップショット）</b>を作っておくと、いつでもその状態に戻せます。最新10件まで保持。</p>
  <div class="note">${note}</div>
  <div class="seg"><button class="on" id="snapNew">＋ 現在を一次保存</button><button id="snapNamed">＋ 名前を付けて保存</button></div>
  <h3>保存済み（新しい順）</h3><div class="rowlist" id="snapList"></div>`;
  openModal("💾 一次保存（スナップショット）",html,()=>{$("#snapNew").onclick=()=>saveSnap();$("#snapNamed").onclick=()=>{const n=prompt("一次保存の名前");if(n!==null)saveSnap(n.trim()||undefined);};renderSnapModal();},"SAVE");
}

/* ============== LOG MODAL ============== */
function openLog(){const html=`<p class="lead">アプリ内で起きたエラーや主要操作の記録です。うまく動かない時は、ここを<b>コピー</b>または<b>.txt保存</b>して共有してください。</p>
  <div class="seg"><button class="on" id="logCopy">⧉ 全コピー</button><button id="logDl">⤓ .txt保存</button><button id="logClear">🗑 クリア</button><button id="logTest">⚑ テスト記録</button></div>
  <div class="logbox" id="logBox"></div>`;
  openModal("🩺 エラーログ",html,()=>{$("#logCopy").onclick=()=>copyText(logText());$("#logDl").onclick=()=>download(`usausa_log_${Date.now()}.txt`,logText(),"text/plain;charset=utf-8");$("#logClear").onclick=()=>{errlog.length=0;updateLogBadge();renderLogBox();};$("#logTest").onclick=()=>{logEvent("INFO","テスト記録（動作確認）");renderLogBox();};renderLogBox();},"LOG");
}
function logText(){return `=== うさうさスイート ${APP_VERSION} ログ (${new Date().toLocaleString("ja-JP")}) ===\nモード:${MODE_LABEL} / 保存:${HAS_LS?"localStorage":"メモリ"} / UA:${navigator.userAgent}\n\n`+(errlog.length?errlog.map(e=>`[${e.t}] ${e.type}: ${e.msg}${e.extra?" ("+e.extra+")":""}`).join("\n"):"(記録なし)");}
function renderLogBox(){const box=$("#logBox");if(!box)return;if(!errlog.length){box.innerHTML='<div class="emptybox">記録はありません。</div>';return;}box.innerHTML=errlog.map(e=>`<div class="logline ${e.type}"><span class="lt">[${e.t}]</span> <span class="tp">${e.type}</span> ${escH(e.msg)}${e.extra?' <span class="lt">('+escH(e.extra)+')</span>':''}</div>`).join("");}

/* ============== HELP（増量） ============== */

  const html=`
  <p class="lead">AI研修の導入を <b>6フェーズ</b>で入力すると、各フェーズの<b>実務ドキュメント</b>と<b>Claude投入プロンプト</b>を自動生成します。すべてオフライン動作・外部送信なし。<b>${APP_VERSION}</b>。</p>

  <p>この1ファイルは環境を自動判定して動きます。いま動作中のモードは画面上部ステータスと🩺ログ先頭に表示されます（現在：<b>${MODE_LABEL}</b>）。</p>

    <li><b>セッションモード</b>（claude.ai等の保存制限環境）：自動保存なし（リロードで消える）。<b>JSON保存</b>や<b>一次保存（セッション内）</b>で保全してください。</li>
  </ul>
  <div class="note">確実な保全は<b>JSON保存</b>を併用してください。別端末への移行もJSONで行えます。</div>

  <h3>1. 基本の流れ</h3>
  <div class="step"><div class="n">1</div><div><b>案件レジストリを埋める</b>（共通メタ・役職名で）。</div></div>
  <div class="step"><div class="n">2</div><div><b>左の MISSION DECK でフェーズ選択</b>。進捗%が出て、100%で🎉演出。</div></div>
  <div class="step"><div class="n">3</div><div><b>入力欄を埋める</b>（テキスト／リスト＋行追加／表）。</div></div>
  <div class="step"><div class="n">4</div><div><b>生成ドック</b>でドキュメント／プロンプトを確認・コピー・出力。</div></div>
  <div class="step"><div class="n">5</div><div><b>📤 出力</b>で全体を4形式（MD/TXT/PDF/CSV）に書き出し。</div></div>

  <h3>2. PH-02 ケイパビリティマップ</h3>
  <p>PH-02には2タブ。</p>
  <ul>
    <li><span class="kbd">✍️ 設計する</span>：プリセット（初心者向け/実務向け）から3層スキルとルーブリックを<b>投入</b>し、案件向けに編集。</li>
    <li><span class="kbd">📖 学ぶ（マップ）</span>：🌱初心者／🛠実務タブで、定義→たとえ🍜→詳細→一言と3層を読み、<b>実践チェック</b>で自己評価。<b>⊕この内容を「設計する」に投入</b>で反映。</li>
  </ul>
  <div class="note">投入は<b>追記</b>方式（既存行は消えません・同名重複なし）。🍜のたとえは入口用で<b>※不正確</b>。仕様は更新されるため公式で最新確認を。</div>

  <h3>3. 出力（MD / TXT / PDF / CSV）</h3>
  <p>右上 <b>📤 出力</b>（または生成ドックの📤）で<b>出力センター</b>が開きます。</p>
  <ol>
    <li><b>スコープ</b>を選ぶ：このフェーズ／全フェーズ統合／ケイパビリティ自己チェック。</li>

      <ul>
        <li><b>📄 Markdown(.md)</b>：見出し・表つき。Notion等にそのまま。</li>
        <li><b>📝 テキスト(.txt)</b>：装飾を外したプレーン。メールやメモ向け。</li>

    <li><b>CSVが文字化け</b>：Excelで開く前提のBOM付きです。スプレッドシートでUTF-8指定でも開けます。</li>
    <li><b>ボタンが反応しない</b>：🩺ログを確認し、内容を共有してください。</li>
  </ul>`;
